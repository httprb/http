plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-minitest

inherit_from:
  - .rubocop/layout.yml
  - .rubocop/metrics.yml
  - .rubocop/minitest.yml
  - .rubocop/style.yml

AllCops:
  DisplayCopNames: true
  DisplayStyleGuide: true
  NewCops: enable
  TargetRubyVersion: 3.2

# Feature has no initialize, so super() is a no-op in subclasses
Lint/MissingSuper:
  AllowedParentClasses:
    - BasicObject
    - Feature
