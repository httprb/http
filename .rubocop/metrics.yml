Metrics/AbcSize:
  Exclude:
    - 'test/support/**/*.rb'

Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/BlockLength:
  CountAsOne:
    - array
    - heredoc
    - method_call
  Exclude:
    - 'test/**/*.rb'
    - '*.gemspec'

Metrics/ClassLength:
  CountAsOne:
    - array
    - heredoc
    - method_call
  Exclude:
    - 'test/support/**/*.rb'

Metrics/MethodLength:
  CountAsOne:
    - array
    - heredoc
    - method_call
  Exclude:
    - 'test/support/**/*.rb'

Metrics/ModuleLength:
  CountAsOne:
    - array
    - heredoc
    - method_call
  Exclude:
    - 'test/support/**/*.rb'
